name: build

permissions:
  contents: write

# Manual trigger only. No scheduled builds, no push-triggered betas - releases
# are cut on demand from the Actions tab. See task #26 for the design brief.
on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version to tag/publish (e.g. "3.4"). Leave blank to auto-increment the highest existing 3.X tag.'
        required: false
        default: ''

jobs:
  # ---------------------------------------------------------------------------
  # Decide whether to build. Skip runs where the only diff since the last
  # release tag touches docs / READMEs / .gitignore. Embedded assets that the
  # exe actually ships with (like code/res/**) are NOT in the skip set because
  # changing those changes the binary.
  # ---------------------------------------------------------------------------
  check-changes:
    name: Check for code changes since last release
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide whether to build
        id: check
        shell: bash
        run: |
          set -euo pipefail

          # Newest X.Y (or X.Y.Z) release tag
          LAST_TAG=$(git tag --list \
            | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' \
            | sort -V \
            | tail -n 1 || true)

          echo "Last release tag: ${LAST_TAG:-<none>}"

          if [ -z "${LAST_TAG:-}" ]; then
            echo "No prior release - building."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_COMMIT=$(git rev-list -n 1 "$LAST_TAG")
          CHANGES=$(git diff --name-only "$LAST_COMMIT" HEAD \
            | grep -vE '(\.md$|^\.gitignore$|^docs/)' || true)

          if [ -z "$CHANGES" ]; then
            echo "Only docs/gitignore changed since $LAST_TAG; skipping build."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Relevant changes detected; running build."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Compute the next 3.X version. Honors the workflow_dispatch input if set,
  # otherwise auto-increments: next = max(existing 3.X tag).X + 1.
  # ---------------------------------------------------------------------------
  compute-version:
    name: Compute release version
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          OVERRIDE='${{ github.event.inputs.version_override }}'
          if [ -n "$OVERRIDE" ]; then
            VERSION="$OVERRIDE"
            echo "Using workflow_dispatch override: $VERSION"
          else
            # Take all "3.X" tags, pick the highest X, add one. When there are
            # no 3.X tags yet the first published release is 3.0.
            HIGHEST=$(git tag --list '3.*' \
              | grep -E '^3\.[0-9]+$' \
              | awk -F. '{print $2}' \
              | sort -n \
              | tail -n 1 || true)
            if [ -z "$HIGHEST" ]; then
              NEXT=0
            else
              NEXT=$((HIGHEST + 1))
            fi
            VERSION="3.${NEXT}"
            echo "Auto-incremented version: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Windows Release build. Single x86 matrix entry - ModView is a 32-bit MFC
  # application and the 64-bit port is deferred (see conversation in issue
  # TBD / task notes).
  # ---------------------------------------------------------------------------
  windows:
    name: Windows Release
    needs: [check-changes, compute-version]
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -A Win32 \
            -DCMAKE_BUILD_TYPE=Release \
            -DMODVIEW_VERSION_STRING="${{ needs.compute-version.outputs.version }}"

      - name: Build
        shell: bash
        run: cmake --build build --config Release -j $NUMBER_OF_PROCESSORS --target ModView

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p dist
          # CMakeLists sets CMAKE_RUNTIME_OUTPUT_DIRECTORY to <src>/Build, so
          # the exe lands at the repo root's Build/ regardless of where we
          # configure. Copy the README in case release-goers want the
          # introduction text alongside the exe.
          cp Build/ModView.exe dist/
          cp README.md dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModView-windows-x86
          path: dist
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Tag + publish GitHub Release with the built ModView.exe.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [check-changes, compute-version, windows]
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ModView-windows-x86
          path: artifact

      - name: Create zip
        shell: bash
        run: |
          cd artifact
          zip -r "../ModView-${{ needs.compute-version.outputs.version }}-windows-x86.zip" .

      - name: Setup git authentication
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push version tag
        id: tag
        run: |
          TAG="${{ needs.compute-version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ModView ${{ steps.tag.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: ModView-${{ needs.compute-version.outputs.version }}-windows-x86.zip
